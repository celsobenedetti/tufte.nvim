<!doctype html>
<!--
  PROTOTYPE — throwaway. Answers: "what does the tufte.nvim palette look like?"

  Switches between palette variants (defined in lua/tufte/palettes/ and
  compiled to CSS by make-prototype.sh) via the floating bottom bar or
  arrow keys.  Each renders the SAME mock Neovim editor at the SAME
  token→tier mapping, so only the palette colours differ.

  Regenerate the palette CSS:
    cd prototype && ./make-prototype.sh

  Run:
    open this file in a browser, e.g.  xdg-open prototype/tufte-colors.html
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tufte.nvim — palette prototype</title>
    <link rel="stylesheet" href="palettes.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family:
          ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        font-size: 15px;
        line-height: 1.55;
        background: var(--wallpaper, #e9e6da);
        color: var(--t7, #333);
        padding: 28px 28px 96px;
        transition: background 0.2s;
      }
      .meta {
        max-width: 980px;
        margin: 0 auto 18px;
        font-family: Georgia, "Times New Roman", serif;
      }
      .meta h1 {
        font-size: 20px;
        margin: 0 0 2px;
        letter-spacing: 0.3px;
      }
      .meta .sub {
        color: var(--t4, #666);
        font-size: 14px;
      }
      .meta .desc {
        margin-top: 10px;
        font-size: 14px;
        color: var(--t5, #444);
        max-width: 720px;
      }
      .meta .desc b {
        color: var(--t7);
      }

      /* ---- editor frame ---- */
      .editor {
        max-width: 980px;
        margin: 0 auto;
        border-radius: 8px;
        overflow: hidden;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.14),
          0 2px 8px rgba(0, 0, 0, 0.08);
        background: var(--bg);
        color: var(--t7);

        --bg-dark: color-mix(in srgb, var(--bg), var(--t6) 5%);
        --bg-gutter: color-mix(in srgb, var(--bg), var(--t6) 2.5%);
        --rule: color-mix(in srgb, var(--bg), var(--t6) 10%);
        --cursorline: color-mix(in srgb, var(--bg), var(--t6) 5%);
      }
      .titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        background: var(--bg-dark);
        border-bottom: 1px solid var(--rule);
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: var(--t3);
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        opacity: 0.55;
      }
      .dot.r {
        background: var(--accent);
        opacity: 0.8;
      }
      .dot.y {
        background: var(--t4);
      }
      .dot.g {
        background: var(--t4);
      }
      .titlebar .path {
        margin-left: 6px;
      }

      .code {
        display: grid;
        grid-template-columns: auto 1fr;
      }
      .gutter {
        text-align: right;
        padding: 14px 10px 14px 16px;
        color: var(--t1);
        user-select: none;
        background: var(--bg-gutter);
        border-right: 1px solid var(--rule);
        white-space: pre;
      }
      .gutter .cur {
        color: var(--t3);
      }
      .gutter .sign-add {
        color: var(--t5);
      }
      .gutter .sign-del {
        color: var(--accent);
      }

      pre.src {
        margin: 0;
        padding: 14px 18px;
        white-space: pre;
        overflow-x: auto;
      }
      .line {
        display: block;
      }
      .line.cursor {
        background: var(--cursorline);
        margin: 0 -18px;
        padding: 0 18px;
      }

      /* token → luminance tier mapping (mirrors lua/tufte/colors/init.lua) */
      .cmt {
        color: var(--t2);
        font-style: italic;
      } /* T2 comments */
      .op {
        color: var(--t3);
      } /* T3 operators / punctuation */
      .str {
        color: var(--t4);
      } /* T4 strings */
      .num {
        color: var(--t4);
      } /* T4 numbers */
      .var {
        color: var(--t5);
      } /* T5 variables / properties */
      .typ {
        color: var(--t6);
      } /* T6 types / statements */
      .fn {
        color: var(--t7);
        font-weight: 600;
      } /* T7 functions (definitions) */
      .call {
        color: var(--secondary);
        font-weight: 600;
      } /* secondary — function CALLS, Special */
      .kw {
        color: var(--t7);
        font-style: italic;
      } /* T7 keywords */
      .fg {
        color: var(--t7);
      } /* main fg */
      .sel {
        background: var(--highlight);
      } /* yellow selection */
      .accent {
        color: var(--accent);
      } /* vermillion — RARE */

      .diag {
        display: inline-block;
        margin-left: 14px;
        color: var(--accent);
        font-style: italic;
        opacity: 0.9;
      }

      /* ---- statusline ---- */
      .statusline {
        display: flex;
        align-items: stretch;
        font-size: 12.5px;
        background: var(--bg-dark);
        border-top: 1px solid var(--rule);
        color: var(--t4);
      }
      .statusline .mode {
        background: var(--t7);
        color: var(--bg);
        padding: 5px 14px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .statusline .seg {
        padding: 5px 12px;
      }
      .statusline .seg.file {
        color: var(--t6);
      }
      .statusline .grow {
        flex: 1;
      }
      .statusline .seg.err {
        color: var(--accent);
      }

      /* ---- the ramp swatches ---- */
      .ramp {
        max-width: 980px;
        margin: 16px auto 0;
        display: flex;
        gap: 0;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }
      .ramp .chip {
        flex: 1;
        padding: 10px 8px 8px;
        font-size: 10.5px;
        font-family: ui-monospace, monospace;
      }
      .ramp .chip .lab {
        opacity: 0.75;
      }
      .ramp .chip .hex {
        display: block;
        margin-top: 2px;
      }

      /* ---- floating switcher ---- */
      #bar {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1b1b1b;
        color: #f4f4f4;
        border-radius: 999px;
        padding: 6px 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        z-index: 999;
        font-family: ui-monospace, monospace;
        font-size: 13px;
      }
      #bar button {
        all: unset;
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 999px;
        line-height: 1;
        color: #f4f4f4;
      }
      #bar button:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      #bar .label {
        padding: 0 12px;
        min-width: 220px;
        text-align: center;
      }
      #bar .label b {
        color: #fff;
      }
      #bar .label .k {
        color: #ff8a80;
        font-weight: 700;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="meta">
      <h1 id="v-title">—</h1>
      <div class="sub" id="v-sub">—</div>
      <div class="desc" id="v-desc">—</div>
    </div>

    <div class="editor" id="editor">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span
        ><span class="dot g"></span>
        <span class="path"
          >~/projects/tufte.nvim/lua/tufte/colors/init.lua</span
        >
      </div>
      <div class="code">
        <div class="gutter" id="gutter"></div>
        <pre class="src" id="src"></pre>
      </div>
      <div class="statusline">
        <span class="mode">NORMAL</span>
        <span class="seg file">init.lua</span>
        <span class="seg">lua</span>
        <span class="grow"></span>
        <span class="seg err">● 1</span>
        <span class="seg">utf-8</span>
        <span class="seg">42:17</span>
      </div>
    </div>

    <div class="ramp" id="ramp"></div>

    <div id="bar">
      <button id="prev" aria-label="previous">←</button>
      <span class="label"
        ><span class="k" id="k">A</span><b id="name">—</b></span
      >
      <button id="next" aria-label="next">→</button>
    </div>

    <script>
      // ---------- palette metadata (names + descriptions — static) ----------
      const PALETTE_META = {
        cannonical: {
          name: "Off-black (Tufte-CSS canonical)",
          desc:
            "Text = <b>#111111</b> exactly per the Tufte-CSS spec, the seven" +
            " tiers a cool-neutral gray ramp.  The most literal reading of the" +
            " source note — restrained, closest to ink-on-paper. A deep teal" +
            " <b>secondary</b> ink marks <code>Special</code> and function calls.",
          fg_comment: "off-black ink",
        },
        coffee: {
          name: "Black-coffee ink (warm variant)",
          desc:
            "A whisper of warmth over the canonical ramp: the seven tiers" +
            " blend cream into <b>#2d1c0b</b> (black coffee) with mid-tones" +
            " nudged warm, so grays read as coffee, not gray. A verdigris" +
            " <b>secondary</b> ink — teal warmed toward the coffee ink — marks" +
            " <code>Special</code> and function calls.",
          fg_comment: "black coffee ink",
        },
        dark: {
          name: "Dark (inverted canonical)",
          desc:
            "Used automatically when Neovim's <code>background=dark</code>," +
            " regardless of <code>variant</code>. The canonical ramp" +
            " luminance-inverted: <b>#111111</b> (canonical's ink) becomes the" +
            " paper, <b>#eeeeee</b> becomes the ink. Accent, highlight, and" +
            " diff washes are re-picked rather than inverted, so light ink" +
            " stays legible drawn on top of them.",
          fg_comment: "near-white ink (canonical's paper, promoted)",
        },
      };

      // ---------- read current palette colours from CSS variables ----------
      function getPaletteColors() {
        const s = getComputedStyle(document.documentElement);
        const get = (n) => s.getPropertyValue(n).trim();
        return {
          bg: get("--bg"),
          tiers: [1, 2, 3, 4, 5, 6, 7].map((i) => get("--t" + i)),
          accent: get("--accent"),
          highlight: get("--highlight"),
          secondary: get("--secondary"),
          wallpaper: get("--wallpaper"),
        };
      }

      // ---------- code sample builder (token classes: cmt op str num var typ fn kw accent) ----------
      // Builds the palette object + a mock setup function with a spurious lint diagnostic.
      function buildLines(colors, meta) {
        const t = colors.tiers;
        // The line where `local c` is declared (needed for the diagnostic message)
        const cLine = 20;
        return [
          {
            n: 1,
            html: `<span class="cmt">--- The seven luminance tiers: T1 faint chrome → T7 focus</span>`,
          },
          {
            n: 2,
            html: `<span class="kw">local</span> <span class="var">palette</span> <span class="op">=</span> <span class="op">{</span>`,
          },
          {
            n: 3,
            html: `  <span class="var">bg</span>    <span class="op">=</span> <span class="str">"${colors.bg}"</span><span class="op">,</span>  <span class="cmt">-- creamy off-white paper</span>`,
          },
          {
            n: 4,
            html: `  <span class="var">fg</span>    <span class="op">=</span> <span class="str">"${t[6]}"</span><span class="op">,</span>  <span class="cmt">-- ${meta.fg_comment}</span>`,
          },
          {
            n: 5,
            html: `  <span class="var">accent</span> <span class="op">=</span> <span class="accent">"${colors.accent}"</span><span class="op">,</span> <span class="cmt">-- vermillion, used sparingly</span>`,
          },
          {
            n: 6,
            html: `  <span class="var">highlight</span> <span class="op">=</span> <span class="str">"${colors.highlight}"</span><span class="op">,</span> <span class="cmt">-- yellow: search, selection, todo</span>`,
          },
          {
            n: 7,
            html: `  <span class="var">tiers</span> <span class="op">=</span> <span class="op">{</span>`,
          },
          {
            n: 8,
            html: `    <span class="str">"${t[0]}"</span><span class="op">,</span> <span class="cmt">-- T1 faint chrome: gutter, line numbers</span>`,
          },
          {
            n: 9,
            html: `    <span class="str">"${t[1]}"</span><span class="op">,</span> <span class="cmt">-- T2 comments</span>`,
          },
          {
            n: 10,
            html: `    <span class="str">"${t[2]}"</span><span class="op">,</span> <span class="cmt">-- T3 operators, punctuation, hints</span>`,
          },
          {
            n: 11,
            html: `    <span class="str">"${t[3]}"</span><span class="op">,</span> <span class="cmt">-- T4 strings, numbers, secondary data</span>`,
          },
          {
            n: 12,
            html: `    <span class="str">"${t[4]}"</span><span class="op">,</span> <span class="cmt">-- T5 variables, properties, constructors</span>`,
          },
          {
            n: 13,
            html: `    <span class="str">"${t[5]}"</span><span class="op">,</span> <span class="cmt">-- T6 types, statements, titles</span>`,
          },
          {
            n: 14,
            html: `    <span class="str">"${t[6]}"</span><span class="op">,</span> <span class="cmt">-- T7 functions, keywords (main fg)</span>`,
          },
          { n: 15, html: `  <span class="op">},</span>` },
          { n: 16, html: `<span class="op">}</span>` },
          { n: 17, html: `` },
          {
            n: 18,
            html: `<span class="cmt">--- Map a syntax group onto a tier by prominence.</span>`,
          },
          {
            n: 19,
            html: `<span class="kw">function</span> <span class="typ">M</span><span class="op">.</span><span class="fn">setup</span><span class="op">(</span><span class="var">opts</span><span class="op">)</span>`,
            cursor: true,
          },
          {
            n: 20,
            html: `  <span class="kw">local</span> <span class="var">c</span> <span class="op">=</span> <span class="var">vim</span><span class="op">.</span><span class="call">tbl_extend</span><span class="op">(</span><span class="str">"force"</span><span class="op">,</span> <span class="var">palette</span><span class="op">,</span> <span class="var">opts</span><span class="op">)</span>`,
          },
          {
            n: 21,
            html: `  <span class="typ">Comment</span> <span class="op">=</span> <span class="op">{</span> <span class="var">fg</span> <span class="op">=</span> <span class="var">c</span><span class="op">.</span><span class="var">tiers</span><span class="op">[</span><span class="num">2</span><span class="op">]</span><span class="op">,</span> <span class="var">italic</span> <span class="op">=</span> <span class="kw">true</span> <span class="op">}</span>`,
          },
          {
            n: 22,
            html: `  <span class="typ">Special</span> <span class="op">=</span> <span class="op">{</span> <span class="var">fg</span> <span class="op">=</span> <span class="var">c</span><span class="op">.</span><span class="call">secondary</span> <span class="op">}</span>`,
          },
          {
            n: 23,
            html: `  <span class="kw">return</span> <span class="call">apply</span><span class="op">(</span><span class="sel">c, opts.groups</span><span class="op">)</span>`,
            diag: "unused local `c` — shadows line " + cLine,
          },
          { n: 24, html: `<span class="kw">end</span>` },
        ];
      }

      // token classes (same) also used in the ramp swatches
      const LABELS = [
        "T1 chrome",
        "T2 comment",
        "T3 punct",
        "T4 string",
        "T5 var",
        "T6 type",
        "T7 focus",
      ];

      // ---------- render ----------
      function render(key) {
        const v = PALETTE_META[key];
        if (!v) return;

        // Switch palette via CSS class
        document.documentElement.className = "palette-" + key;

        // Read the active palette's colours from CSS variables
        const colors = getPaletteColors();
        const t = colors.tiers;

        // Build lines from the current palette
        const lines = buildLines(colors, v);

        // gutter
        const g = lines
          .map((l) => {
            const cls = l.cursor ? "cur" : "";
            return `<span class="${cls}">  ${String(l.n).padStart(2, " ")}</span>`;
          })
          .join("\n");
        document.getElementById("gutter").innerHTML = g;

        // source
        const src = lines
          .map((l) => {
            const diag = l.diag ? `<span class="diag">◆ ${l.diag}</span>` : "";
            return `<span class="line ${l.cursor ? "cursor" : ""}">${l.html || " "}${diag}</span>`;
          })
          .join("");
        document.getElementById("src").innerHTML = src;

        // ramp swatches
        document.getElementById("ramp").innerHTML =
          t
            .map((c, i) => {
              const textc = i >= 3 ? colors.bg : t[6];
              return `<div class="chip" style="background:${c};color:${textc}">
      <span class="lab">${LABELS[i]}</span><span class="hex">${c}</span></div>`;
            })
            .join("") +
          `<div class="chip" style="background:${colors.secondary};color:${colors.bg}">
      <span class="lab">secondary</span><span class="hex">${colors.secondary}</span></div>` +
          `<div class="chip" style="background:${colors.accent};color:${colors.bg}">
      <span class="lab">accent</span><span class="hex">${colors.accent}</span></div>`;

        // meta
        document.getElementById("v-title").textContent =
          "tufte.nvim — " + v.name;
        document.getElementById("v-sub").textContent =
          `bg ${colors.bg}  ·  fg ${t[6]}  ·  secondary ${colors.secondary}  ·  accent ${colors.accent}  ·  highlight ${colors.highlight}`;
        document.getElementById("v-desc").innerHTML = v.desc;
        document.getElementById("k").textContent = key.toUpperCase();
        document.getElementById("name").textContent = " " + v.name;
      }

      // ---------- switcher ----------
      const KEYS = Object.keys(PALETTE_META);
      const getV = () => {
        const p = new URLSearchParams(location.search).get("variant");
        return KEYS.includes(p) ? p : KEYS[0];
      };
      function go(key) {
        const u = new URL(location);
        u.searchParams.set("variant", key);
        history.replaceState(null, "", u);
        render(key);
      }
      function step(d) {
        const i = KEYS.indexOf(getV());
        go(KEYS[(i + d + KEYS.length) % KEYS.length]);
      }
      document.getElementById("prev").onclick = () => step(-1);
      document.getElementById("next").onclick = () => step(1);
      document.addEventListener("keydown", (e) => {
        const tag = (e.target.tagName || "").toLowerCase();
        if (tag === "input" || tag === "textarea" || e.target.isContentEditable)
          return;
        if (e.key === "ArrowLeft") step(-1);
        if (e.key === "ArrowRight") step(1);
      });
      render(getV());
    </script>
  </body>
</html>
